<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>LeadingPoint – Company</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;700;900&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:           #dceadc;
      --bg-raised:    #e8f2e8;
      --bg-deep:      #ccdacc;
      --shadow-light: rgba(255,255,255,0.9);
      --shadow-dark:  rgba(0,0,0,0.10);
      --text:         #1a1a1a;
      --muted:        rgba(26,26,26,0.38);
      --border:       rgba(0,0,0,0.07);
      --active:       #2a7a30;
    }

    html, body {
      width: 100%; height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      overflow: hidden;
    }

    #page {
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── NAV ── */
    nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.6rem 3rem;
      border-bottom: 1px solid var(--border);
      background: var(--bg-raised);
      box-shadow:
        0 4px 16px var(--shadow-dark),
        0 -1px 0 var(--shadow-light);
    }

    .nav-logo {
      text-decoration: none;
      display: flex;
      align-items: center;
      flex-shrink: 0;
    }
    .nav-logo img {
      height: 26px;
      width: auto;
      display: block;
    }

    .nav-links {
      display: flex;
      gap: 0.2rem;
      list-style: none;
      align-items: center;
    }
    .nav-links a {
      font-size: 0.72rem;
      font-weight: 400;
      letter-spacing: 0.06em;
      color: var(--muted);
      text-decoration: none;
      text-transform: uppercase;
      padding: 0.4rem 0.75rem;
      border-radius: 8px;
      transition: all 0.2s;
      white-space: nowrap;
    }
    .nav-links a:hover {
      color: var(--text);
      background: var(--bg-deep);
      box-shadow:
        inset 2px 2px 5px var(--shadow-dark),
        inset -2px -2px 5px var(--shadow-light);
    }
    .nav-links a.active {
      color: var(--active);
      position: relative;
    }
    .nav-links a.active::after {
      content: '';
      position: absolute;
      bottom: -2px; left: 50%;
      transform: translateX(-50%);
      width: 4px; height: 4px;
      border-radius: 50%;
      background: var(--active);
    }

    /* ── HAMBURGER ── */
    .nav-menu-btn {
      display: none;
      flex-direction: column;
      justify-content: center;
      gap: 5px;
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px;
      width: 32px;
      height: 32px;
      flex-shrink: 0;
    }
    .nav-menu-btn span {
      display: block;
      width: 100%;
      height: 1.5px;
      background: var(--text);
      border-radius: 2px;
      transition: transform 0.35s ease, opacity 0.35s ease, width 0.35s ease;
      transform-origin: left center;
    }
    .nav-menu-btn.open span:nth-child(1) { transform: rotate(38deg) translateY(-1px); }
    .nav-menu-btn.open span:nth-child(2) { opacity: 0; width: 0; }
    .nav-menu-btn.open span:nth-child(3) { transform: rotate(-38deg) translateY(1px); }

    /* ── OVERLAY MENU ── */
    #menu-overlay {
      position: fixed; inset: 0;
      background: var(--bg-raised);
      z-index: 500;
      display: flex;
      flex-direction: column;
      padding: 2rem 1.5rem;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.4s ease;
    }
    #menu-overlay.open {
      opacity: 1;
      pointer-events: all;
    }

    .overlay-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-bottom: 1.5rem;
      border-bottom: 1px solid var(--border);
      margin-bottom: 2.5rem;
    }
    .overlay-logo { text-decoration: none; display: flex; align-items: center; }
    .overlay-logo img { height: 22px; width: auto; }

    .overlay-close {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.7rem;
      font-weight: 500;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted);
      background: none;
      border: none;
      cursor: pointer;
      transition: color 0.2s;
    }
    .overlay-close:hover { color: var(--text); }

    .overlay-links { list-style: none; }
    .overlay-links li { border-bottom: 1px solid var(--border); }
    .overlay-links a {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1rem 0;
      font-size: 1.3rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: #1a1a1a;
      text-decoration: none;
      transform: translateX(-20px);
      opacity: 0;
      transition: transform 0.4s ease, opacity 0.4s ease, color 0.2s;
    }
    #menu-overlay.open .overlay-links a {
      transform: translateX(0);
      opacity: 1;
    }
    .overlay-links li:nth-child(1) a { transition-delay: 0.05s; }
    .overlay-links li:nth-child(2) a { transition-delay: 0.10s; }
    .overlay-links li:nth-child(3) a { transition-delay: 0.15s; }
    .overlay-links li:nth-child(4) a { transition-delay: 0.20s; }
    .overlay-links li:nth-child(5) a { transition-delay: 0.25s; }
    .overlay-links li:nth-child(6) a { transition-delay: 0.30s; }
    .overlay-links li:nth-child(7) a { transition-delay: 0.35s; }
    .overlay-links a.active { color: var(--active); }
    .overlay-links a:hover { color: rgba(0,0,0,0.3); }
    .overlay-arrow { font-size: 1rem; opacity: 0.3; }

    /* ── HERO ── */
    .hero {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 0 3rem 3rem;
      position: relative;
      background: var(--bg);
    }

    .hero-scroll {
      position: absolute;
      right: 3rem;
      top: 50%;
      transform: translateY(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.7rem;
    }
    .scroll-label {
      font-size: 0.62rem;
      font-weight: 400;
      letter-spacing: 0.2em;
      color: var(--muted);
      text-transform: uppercase;
      writing-mode: vertical-rl;
    }
    .scroll-track {
      width: 3px; height: 70px;
      border-radius: 3px;
      background: var(--bg-deep);
      box-shadow:
        inset 2px 2px 4px var(--shadow-dark),
        inset -1px -1px 3px var(--shadow-light);
      overflow: hidden;
      position: relative;
    }
    .scroll-thumb {
      position: absolute;
      top: -100%; left: 0;
      width: 100%; height: 40%;
      background: rgba(0,0,0,0.15);
      border-radius: 3px;
      animation: scrollDown 2s ease-in-out infinite;
    }
    @keyframes scrollDown {
      0%   { top: -40%; }
      100% { top: 140%; }
    }

    /* ── TITLE ── */
    .hero-title-wrap { overflow: visible; }

    .hero-title {
      font-size: clamp(3rem, 9.5vw, 11rem);
      font-weight: 900;
      line-height: 0.92;
      letter-spacing: -0.03em;
    }

    .title-line { display: block; }

    .title-line-inner {
      display: block;
      visibility: hidden;
      color: #c8dcc8;
      text-shadow:
        -4px -4px  8px  rgba(255,255,255,0.95),
        -10px -10px 20px rgba(255,255,255,0.8),
        4px  4px   8px  rgba(0,0,0,0.09),
        12px 12px  24px rgba(0,0,0,0.06),
        22px 22px  44px rgba(0,0,0,0.03);
    }

    .char-span {
      display: inline-block;
      opacity: 0;
      transform: translateY(60%);
      transition:
        opacity   0.45s ease,
        transform 0.55s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .char-span.up {
      opacity: 1;
      transform: translateY(0);
    }

    /* ── BREAKPOINT 1100px ── */
    @media (max-width: 1100px) {
      nav { padding: 1.4rem 1.5rem; }
      .nav-links { display: none; }
      .nav-menu-btn { display: flex; }
      .hero-scroll { display: none; }
      .hero { padding: 0 1.5rem 2rem; }
      .hero-title { font-size: clamp(2.5rem, 11vw, 5rem); }
    }

    @media (min-width: 1101px) {
      #menu-overlay { display: none; }
    }
  </style>
</head>
<body>

<div id="page">
  <nav>
    <a href="index.html" class="nav-logo">
      <img src="images/logo/LP-LOGO-dark-transparent.png" alt="LeadingPoint"/>
    </a>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="disaster-recovery.html">Disaster Recovery</a></li>
      <li><a href="biometrics.html">Biometrics</a></li>
      <li><a href="cloud.html">Cloud</a></li>
      <li><a href="partners.html">Partners</a></li>
      <li><a href="clients.html">Clients</a></li>
      <li><a href="company.html" class="active">Company</a></li>
    </ul>
    <button class="nav-menu-btn" id="hamburger" onclick="toggleMenu()">
      <span></span><span></span><span></span>
    </button>
  </nav>

  <!-- OVERLAY MENU -->
  <div id="menu-overlay">
    <div class="overlay-top">
      <a href="index.html" class="overlay-logo">
        <img src="images/logo/LP-LOGO-dark-transparent.png" alt="LeadingPoint"/>
      </a>
      <button class="overlay-close" onclick="toggleMenu()">CLOSE ✕</button>
    </div>
    <ul class="overlay-links">
      <li><a href="index.html" onclick="toggleMenu()">Home <span class="overlay-arrow">↗</span></a></li>
      <li><a href="disaster-recovery.html" onclick="toggleMenu()">Disaster Recovery <span class="overlay-arrow">↗</span></a></li>
      <li><a href="biometrics.html" onclick="toggleMenu()">Biometrics <span class="overlay-arrow">↗</span></a></li>
      <li><a href="cloud.html" onclick="toggleMenu()">Cloud <span class="overlay-arrow">↗</span></a></li>
      <li><a href="partners.html" onclick="toggleMenu()">Partners <span class="overlay-arrow">↗</span></a></li>
      <li><a href="clients.html" onclick="toggleMenu()">Clients <span class="overlay-arrow">↗</span></a></li>
      <li><a href="company.html" class="active" onclick="toggleMenu()">Company <span class="overlay-arrow">↗</span></a></li>
    </ul>
  </div>

  <section class="hero">
    <div class="hero-scroll">
      <span class="scroll-label">Scroll</span>
      <div class="scroll-track"><div class="scroll-thumb"></div></div>
    </div>
    <div class="hero-title-wrap">
      <h1 class="hero-title">
        <span class="title-line"><span class="title-line-inner" id="line1">COMPANY</span></span>
      </h1>
    </div>
  </section>
</div>

<script>
  function toggleMenu() {
    document.getElementById('menu-overlay').classList.toggle('open');
    document.getElementById('hamburger').classList.toggle('open');
  }

  function buildTitle() {
    const STAGGER = 0.11;
    let idx = 0;
    const inner = document.getElementById('line1');
    const text  = inner.textContent;
    inner.textContent = '';
    inner.style.visibility = 'visible';
    text.split('').forEach(ch => {
      const s = document.createElement('span');
      s.className = 'char-span';
      s.textContent = ch;
      s.style.transitionDelay = (idx * STAGGER).toFixed(2) + 's';
      inner.appendChild(s);
      idx++;
    });
    requestAnimationFrame(() => requestAnimationFrame(() => {
      document.querySelectorAll('.char-span').forEach(s => s.classList.add('up'));
    }));
  }

  window.addEventListener('load', () => setTimeout(buildTitle, 80));
</script>
</body>
</html>
